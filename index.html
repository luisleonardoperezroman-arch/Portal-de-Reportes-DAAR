<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Reportes — DAAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0f2542;
    --accent: #e8a12a;
    --accent2:#f0c060;
    --light:  #f5f3ee;
    --light2: #ede9e0;
    --white:  #ffffff;
    --text:   #0f2542;
    --muted:  #5a6e84;
    --border: rgba(15,37,66,0.12);
    --radius: 12px;
    --shadow: 0 2px 16px rgba(15,37,66,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    height: 64px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06);
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: var(--navy);
    flex-shrink: 0; margin-right: 14px;
  }
  .logo-text { color: #fff; font-size: 15px; font-weight: 500; line-height: 1.3; }
  .logo-text span { display: block; font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.55); margin-top: 1px; }

  main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  .page-title { font-size: 26px; font-weight: 600; color: var(--navy); line-height: 1.2; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.75rem; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 5px 15px; border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  #cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
  }

  .report-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s, transform 0.15s;
  }
  .report-card:hover { box-shadow: 0 6px 24px rgba(15,37,66,0.12); transform: translateY(-1px); }

  .area-badge {
    display: inline-block;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 10px; border-radius: 99px;
    text-transform: uppercase; width: fit-content;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--navy); line-height: 1.35; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.55; flex: 1; }
  .card-open-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; color: #185fa5;
    background: #e6f1fb; border: none; border-radius: 7px;
    padding: 6px 12px; cursor: pointer;
    margin-top: 4px; transition: background 0.15s;
    text-decoration: none;
  }
  .card-open-btn:hover { background: #b5d4f4; }

  .footer-count { font-size: 12px; color: var(--muted); margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .page-title { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">UP</div>
  <div class="logo-text">
    Portal de Reportes
    <span>Dirección de Asuntos Académicos y Registro</span>
  </div>
</header>

<main>
  <div class="page-title">Reportes de gestión</div>
  <div class="page-sub">Haz clic en cualquier reporte para abrirlo en Google Drive</div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterArea(this,'all')">Todos</button>
    <button class="filter-btn" onclick="filterArea(this,'Pregrado')">Pregrado</button>
    <button class="filter-btn" onclick="filterArea(this,'Posgrado')">Posgrado</button>
    <button class="filter-btn" onclick="filterArea(this,'Idiomas')">Idiomas</button>
    <button class="filter-btn" onclick="filterArea(this,'Jefaturas')">Jefaturas</button>
  </div>

  <div id="cards-grid"></div>
  <div class="footer-count" id="footer-count"></div>
</main>

<script>
const AREA_STYLE = {
  Pregrado:  { bg:'#e6f0fb', color:'#0c3a6e' },
  Posgrado:  { bg:'#eeedfe', color:'#3c3489' },
  Idiomas:   { bg:'#eaf3de', color:'#27500a' },
  Jefaturas: { bg:'#faeeda', color:'#633806' },
};

// ─────────────────────────────────────────────
// EDITA AQUÍ TUS REPORTES
// ─────────────────────────────────────────────
const reports = [
  { id:1, area:'Pregrado',  title:'Matrícula Pregrado',           desc:'Reporte de matrículas activas por ciclo y carrera.',            link:'https://drive.google.com' },
  { id:2, area:'Pregrado',  title:'Reservas de Aulas',            desc:'Estado de reservas y ocupación de aulas por semana.',           link:'https://drive.google.com' },
  { id:3, area:'Posgrado',  title:'Matrículas Posgrado',          desc:'Seguimiento de matrícula inicial, recurrente y extraordinaria.',link:'https://drive.google.com' },
  { id:4, area:'Posgrado',  title:'Certificaciones EGP',          desc:'Estado de certificaciones por empresa y subunidad.',           link:'https://drive.google.com' },
  { id:5, area:'Idiomas',   title:'Avance Idiomas',               desc:'KPIs de progreso por nivel e idioma.',                         link:'https://drive.google.com' },
  { id:6, area:'Jefaturas', title:'Horas Extra y Compensatorias', desc:'Control mensual por área y colaborador.',                      link:'https://drive.google.com' },
  { id:7, area:'Jefaturas', title:'KPIs Generales DAAR',          desc:'Dashboard ejecutivo con indicadores clave de gestión.',        link:'https://drive.google.com' },
  { id:8, area:'Posgrado',  title:'Certificaciones PBS',          desc:'Reporte de empresas prioritarias y avance de programas.',      link:'https://drive.google.com' },
];
// ─────────────────────────────────────────────

let currentFilter = 'all';

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards() {
  const filtered = currentFilter === 'all' ? reports : reports.filter(r => r.area === currentFilter);
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  filtered.forEach(r => {
    const st = AREA_STYLE[r.area] || AREA_STYLE['Jefaturas'];
    const card = document.createElement('div');
    card.className = 'report-card';
    card.innerHTML = `
      <span class="area-badge" style="background:${st.bg};color:${st.color};">${r.area}</span>
      <div class="card-title">${esc(r.title)}</div>
      <div class="card-desc">${esc(r.desc)}</div>
      <a class="card-open-btn" href="${esc(r.link)}" target="_blank" rel="noopener">↗ Abrir reporte</a>`;
    grid.appendChild(card);
  });
  document.getElementById('footer-count').textContent =
    filtered.length + ' reporte' + (filtered.length !== 1 ? 's' : '') + ' · DAAR UP';
}

function filterArea(btn, area) {
  currentFilter = area;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

renderCards();
</script>
</body>
</html>
